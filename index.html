<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bolão Contax Copa 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #ff0030;
    --orange-light: #ff4d6a;
    --bg: #030710;
    --bg2: #0a1020;
    --bg3: #111827;
    --surface: #1a2235;
    --surface2: #232e42;
    --border: rgba(255,0,48,0.18);
    --border2: rgba(255,0,48,0.35);
    --text: #f0f4ff;
    --text2: #8ea0bc;
    --text3: #5a6b82;
    --green: #22c55e;
    --yellow: #eab308;
    --blue: #3b82f6;
    --red: #ef4444;
    --radius: 10px;
    --radius-lg: 14px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  nav { background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 0 1rem; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-size: 15px; font-weight: 700; color: var(--orange); padding: 10px 0; margin-right: 1.25rem; display: flex; align-items: center; gap: 10px; white-space: nowrap; justify-content: center; }
  .nav-logo { height: 32px; width: auto; display: block;  }
  .nav-divider { width: 1px; height: 24px; background: var(--border2); }
  .nav-tabs { display: flex; flex: 1; overflow-x: auto; }
  .nav-tab { padding: 13px 13px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  @media (max-width: 600px) {
    nav { flex-wrap: wrap; padding: 0 .75rem; }
    .nav-brand { width: 100%; padding: 10px 0 6px; margin-right: 0; border-bottom: 1px solid var(--border); }
    .nav-tabs { width: 100%; }
    .nav-tab { flex: 1; text-align: center; padding: 10px 6px; font-size: 12px; justify-content: center; display: flex; align-items: center; gap: 4px; }
    .nav-logo { height: 24px; }
    .nav-divider { display: none; }
    .admin-badge { display: none; }
  }
  .admin-badge { font-size: 10px; background: var(--orange); color: #000; padding: 2px 6px; border-radius: 20px; margin-left: 5px; font-weight: 700; }


  .admin-badge { font-size: 10px; background: var(--orange); color: #000; padding: 2px 6px; border-radius: 20px; margin-left: 5px; font-weight: 700; }

  .page { padding: 1.25rem 1rem; max-width: 960px; margin: 0 auto; width: 100%; }
  .page-title { font-size: 19px; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 9px; }
  .page-title i { color: var(--orange); font-size: 21px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--orange); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .75rem; }

  .form-row { display: flex; gap: .75rem; margin-bottom: .75rem; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
  label { font-size: 12px; color: var(--text2); font-weight: 500; }
  input, select { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 8px 10px; color: var(--text); font-size: 14px; width: 100%; transition: border-color .15s; outline: none; }
  input:focus, select:focus { border-color: var(--orange); }
  input::placeholder { color: var(--text3); }
  select option { background: var(--bg3); }

  .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-primary { background: var(--orange); color: #000; }
  .btn-primary:hover { background: var(--orange-light); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 6px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-5 { background: rgba(255,0,48,.2); color: var(--orange); }
  .badge-3 { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-1 { background: rgba(59,130,246,.15); color: var(--blue); }
  .badge-0 { background: var(--surface2); color: var(--text3); }
  .badge-enc { background: rgba(34,197,94,.15); color: var(--green); }
  .badge-pend { background: rgba(234,179,8,.15); color: var(--yellow); }
  .badge-ok { background: rgba(255,0,48,.15); color: var(--orange); }

  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .06em; }
  .tbl td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--surface2); }
  .nome-cell { font-weight: 600; }

  /* JOGO CARD (tabela pública) */
  .jogo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .5rem; padding: .75rem 1rem; }
  .jogo-card.encerrado { border-color: rgba(34,197,94,.2); }
  .jogo-header { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .jogo-num { font-size: 11px; font-weight: 700; color: var(--text3); }
  .jogo-fase { font-size: 10px; color: var(--orange); font-weight: 700; background: rgba(255,0,48,.1); padding: 2px 6px; border-radius: 20px; text-transform: uppercase; }
  .jogo-grupo { font-size: 10px; color: var(--text3); }
  .match-row { display: flex; align-items: center; gap: .6rem; }
  .match-team { flex: 1; font-weight: 600; font-size: 13px; }
  .match-team.right { text-align: right; }
  .match-score { display: flex; align-items: center; gap: 5px; }
  .score-num { font-size: 20px; font-weight: 800; color: var(--orange); width: 26px; text-align: center; }
  .score-sep { font-size: 15px; color: var(--text3); }

  /* PALPITE INLINE (modal admin) */
  .palpite-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; background: var(--bg3); border-radius: var(--radius); padding: .6rem .75rem; margin-bottom: .4rem; border: 1px solid var(--border); transition: border-color .15s; }
  .palpite-row:hover { border-color: var(--border2); }
  .palpite-row.has-palpite { border-color: rgba(255,0,48,.3); }
  .palpite-row.encerrado { opacity: .55; }
  .pr-left { text-align: right; }
  .pr-right { text-align: left; }
  .pr-team { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pr-num { font-size: 11px; color: var(--text3); }
  .pr-center { display: flex; align-items: center; gap: 5px; justify-content: center; }
  .pr-input { width: 44px !important; text-align: center; font-size: 17px; font-weight: 700; padding: 5px 4px !important; border-radius: 8px !important; }
  .pr-input:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(255,0,48,.2); }
  .pr-sep { font-size: 16px; color: var(--text3); font-weight: 700; }
  .pr-save { min-width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; border: none; transition: all .15s; }
  .pr-save.save { background: var(--orange); color: #000; }
  .pr-save.save:hover { background: var(--orange-light); }
  .pr-save.saved { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); cursor: default; }
  .pr-save.clear { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
  .pr-save.clear:hover { background: rgba(239,68,68,.25); }

  /* FASE TABS */
  .fase-tabs { display: flex; gap: .4rem; margin-bottom: .9rem; overflow-x: auto; padding-bottom: 2px; }
  .fase-tab { padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: var(--surface); white-space: nowrap; transition: all .15s; }
  .fase-tab.active { background: var(--orange); border-color: var(--orange); color: #000; }
  .fase-tab:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(3,7,16,.88); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.25rem; max-width: 560px; width: 100%; margin: auto; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .modal-title i { color: var(--orange); }
  .modal-subtitle { font-size: 12px; color: var(--text2); margin-bottom: .75rem; }
  .modal-footer { display: flex; gap: .75rem; margin-top: 1rem; justify-content: flex-end; }

  /* ALERT */
  .alert { padding: .65rem .9rem; border-radius: var(--radius); font-size: 13px; margin-bottom: .9rem; }
  .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: var(--green); }
  .alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: var(--red); }

  /* LOGIN */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 340px; text-align: center; }
  .login-logo { font-size: 38px; margin-bottom: 1rem; }
  .login-title { font-size: 19px; font-weight: 700; margin-bottom: .4rem; }
  .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .65rem; margin-bottom: 1.1rem; }
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: .8rem; text-align: center; border: 1px solid var(--border); }
  .stat-num { font-size: 21px; font-weight: 800; color: var(--orange); }
  .stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

  /* PÓDIO */
  .podio { display: grid; grid-template-columns: repeat(3, 1fr); gap: .9rem; margin-bottom: 1.25rem; }
  .podio-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; text-align: center; }
  .podio-card.p1 {
    position: relative;
    border: none;
    padding: 2px;
    background: linear-gradient(90deg, #ff4d6a, #ff6b85, var(--orange), #e6002a, #ff4d6a);
    background-size: 300% auto;
    animation: aurora-text-flow 4s ease-in-out infinite, border-pulse-glow-soft 2s ease-in-out infinite;
  }
  @keyframes border-pulse-glow-soft {
    0%, 100% { box-shadow: 0 0 4px 0 rgba(255,0,48,.3); }
    50% { box-shadow: 0 0 14px 3px rgba(255,0,48,.65); }
  }
  .podio-card.p1 .podio-card-inner {
    background: var(--surface);
    border-radius: calc(var(--radius-lg) - 2px);
    padding: 1rem;
    text-align: center;
  }
  .podio-card.p2 { border-color: rgba(192,192,192,.3); }
  .podio-card.p3 { border-color: rgba(180,120,60,.3); }
  .podio-pos { font-size: 26px; margin-bottom: 5px; }
  .podio-nome { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .podio-pts { font-size: 20px; font-weight: 800; color: var(--orange); }
  .podio-sub { font-size: 11px; color: var(--text3); }

  .next-match-banner {
    position: relative;
    border-radius: var(--radius-lg);
    padding: 2px;
    margin-bottom: 1rem;
    background: linear-gradient(90deg, #ff4d6a, #ff6b85, var(--orange), #e6002a, #ff4d6a);
    background-size: 300% auto;
    animation: aurora-text-flow 4s ease-in-out infinite, border-pulse-glow 2s ease-in-out infinite;
  }
  @keyframes border-pulse-glow {
    0%, 100% { box-shadow: 0 0 4px 0 rgba(255,0,48,.3); }
    50% { box-shadow: 0 0 14px 3px rgba(255,0,48,.65); }
  }
  .next-match-banner-inner {
    background: var(--bg2);
    border-radius: calc(var(--radius-lg) - 2px);
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .next-match-banner.live {
    background: linear-gradient(90deg, #22c55e, #4ade80, #16a34a, #4ade80, #22c55e);
    background-size: 300% auto;
    animation: aurora-text-flow 4s ease-in-out infinite, border-pulse-glow-green 1.6s ease-in-out infinite;
  }
  @keyframes border-pulse-glow-green {
    0%, 100% { box-shadow: 0 0 4px 0 rgba(34,197,94,.3); }
    50% { box-shadow: 0 0 14px 3px rgba(34,197,94,.65); }
  }
  @keyframes aurora-text-flow {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .next-match-label { font-size: 11px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .next-match-content { display: flex; align-items: center; justify-content: center; gap: .75rem; font-size: 16px; font-weight: 700; }
  .next-match-team { display: flex; align-items: center; gap: 6px; }
  .next-match-vs { font-size: 13px; color: var(--text3); font-weight: 500; }
  .next-match-banner.live .next-match-label { color: #22c55e; }
  .next-match-sub { font-size: 11px; color: var(--text3); margin-top: .4rem; }
  .next-match-countdown {
    font-size: 14px; font-weight: 800; margin-top: .6rem; display: flex; align-items: center; justify-content: center; gap: 6px;
    background: linear-gradient(90deg, #ff4d6a, #ff6b85, var(--orange), #e6002a, #ff4d6a);
    background-size: 300% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: aurora-text-flow 4s ease-in-out infinite;
  }
  .next-match-countdown i { -webkit-text-fill-color: var(--orange); color: var(--orange); }
  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(34,197,94,.18); color: #22c55e; -webkit-text-fill-color: #22c55e; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; letter-spacing: .04em; }
  .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse-live 1.2s infinite; }
  @keyframes pulse-live { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(1.3); } }


  .top3-glow td, .top3-glow td * { animation: top3-text-glow 2s ease-in-out infinite; }
  @keyframes top3-text-glow {
    0%, 100% { text-shadow: 0 0 2px rgba(255,0,48,.4); }
    50% { text-shadow: 0 0 10px rgba(255,0,48,.9), 0 0 18px rgba(255,0,48,.5); }
  }
  .top3-last td { border-bottom: 0px solid transparent; position: relative; }
  .top3-last td::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 2px;
    background: var(--orange);
    animation: top3-glow-line 2s ease-in-out infinite;
  }
  @keyframes top3-glow-line {
    0%, 100% { box-shadow: 0 0 2px 0 rgba(255,0,48,.4); opacity: .6; }
    50% { box-shadow: 0 0 10px 2px rgba(255,0,48,.9); opacity: 1; }
  }

  .campeao-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--orange); background: rgba(255,0,48,.12); padding: 2px 7px; border-radius: 20px; }
  .var-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 6px; white-space: nowrap; min-width: 36px; justify-content: center; }
  .var-subiu { background: rgba(34,197,94,.15); color: #22c55e; }
  .var-caiu { background: rgba(239,68,68,.15); color: #ef4444; }
  .var-manteve { background: rgba(255,0,48,.15); color: var(--orange); }
  .var-novo { background: var(--surface2); color: var(--text3); }
  .divider { border: none; border-top: 1px solid var(--border); margin: .9rem 0; }
  .empty { text-align: center; padding: 1.5rem; color: var(--text3); font-size: 13px; }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
  .scroll-x { overflow-x: auto; }
  .palpites-pub-grid { display: grid; gap: .5rem; }
  .pub-palpite-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg3); border-radius: 8px; padding: .5rem .75rem; gap: .5rem; }

  /* ACCORDION PALPITES */
  .jogo-accordion { cursor: pointer; user-select: none; }
  .jogo-accordion-toggle { display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: .6rem; padding: .4rem; border-radius: 8px; font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); border: none; width: 100%; cursor: pointer; transition: all .15s; font-family: 'Inter', system-ui, sans-serif; }
  .jogo-accordion-toggle:hover { color: var(--text2); background: var(--surface2); }
  .jogo-accordion-toggle i { transition: transform .2s; font-size: 14px; }
  .jogo-accordion-toggle.open i { transform: rotate(180deg); }
  .jogo-palpites-list { margin-top: .5rem; display: flex; flex-direction: column; gap: .35rem; }
  .jp-item { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: .5rem; padding: .45rem .7rem; border-radius: 8px; font-size: 12px; }
  .jp-item.acerto-5 { background: rgba(255,0,48,.12); border: 1px solid rgba(255,0,48,.3); }
  .jp-item.acerto-3 { background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2); }
  .jp-item.acerto-1 { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); }
  .jp-item.acerto-0 { background: var(--bg3); border: 1px solid var(--border); }
  .jp-item.sem-resultado { background: var(--bg3); border: 1px solid var(--border); }
  .jp-nome { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .jp-placar { font-size: 14px; font-weight: 800; color: var(--text2); white-space: nowrap; }
  .jp-placar.exato { color: var(--orange); }
  .jp-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .jp-badge.b5 { background: rgba(255,0,48,.2); color: var(--orange); }
  .jp-badge.b3 { background: rgba(34,197,94,.15); color: #22c55e; }
  .jp-badge.b1 { background: rgba(59,130,246,.15); color: #3b82f6; }
  .jp-badge.b0 { background: var(--surface2); color: var(--text3); }
  .jp-badge.bwait { background: var(--surface2); color: var(--text3); }

  /* PLACAR ADMIN INPUT */
  .placar-input-sm { width: 40px !important; text-align: center; font-size: 15px; font-weight: 700; padding: 4px !important; }

  @media (max-width:600px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .podio { gap:.5rem; }
    .podio-card { padding:.7rem .4rem; }
    .podio-nome { font-size:12px; }
    .podio-pts { font-size:16px; }
    .nav-brand { font-size:13px; margin-right:.75rem; }
    .page { padding:1rem .75rem; }
    .pr-team { font-size:12px; }
  }
  @media print {
    nav,.btn,.fase-tabs,.form-row{display:none!important}
    body{background:white;color:#000}
  }
</style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-brand">
      <img src="https://cdn.prod.website-files.com/65c374d11a7f46926a3a150d/65c374d11a7f46926a3a1548_logo_contax.svg" class="nav-logo" alt="Contax"/>
      <div class="nav-divider"></div>
      <span>⚽</span> Bolão Contax Copa 2026
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
  </nav>
  <div id="main-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

async function api(path, method='GET', body=null) {
  // Leitura usa anon key; escrita exige token da sessão autenticada
  const isWrite = method !== 'GET';
  if (isWrite && !state.session?.access_token) throw new Error('Não autenticado');
  const token = isWrite ? state.session.access_token : SUPABASE_KEY;
  const opts = { method, headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL+path, opts);
  if (!r.ok && r.status!==204) { const e=await r.json(); throw new Error(e.message||'Erro'); }
  if (r.status===204) return null;
  return r.json();
}

// Busca TODOS os registros paginando em blocos de 1000 (limite padrão do PostgREST)
// Necessário para tabelas que podem crescer além de 1000 linhas, como palpites.
async function apiAll(path) {
  let all = [];
  let offset = 0;
  const pageSize = 1000;
  while (true) {
    const sep = path.includes('?') ? '&' : '?';
    const page = await api(`${path}${sep}limit=${pageSize}&offset=${offset}`);
    if (!page || page.length === 0) break;
    all = all.concat(page);
    if (page.length < pageSize) break; // última página
    offset += pageSize;
  }
  return all;
}

function computeRanking() {
  const map={};
  for (const p of state.participantes)
    map[p.id]={id:p.id,nome:p.nome,campeao:p.palpite_campeao||'—',pts:0,exatos:0,resultados:0,parciais:0,acertouCampeao:false};
  for (const pa of state.palpites) {
    if (!map[pa.participante_id]) continue;
    const m=map[pa.participante_id];
    if(pa.pontos===5){m.pts+=5;m.exatos++;}
    else if(pa.pontos===3){m.pts+=3;m.resultados++;}
    else if(pa.pontos===1){m.pts+=1;m.parciais++;}
  }
  if (state.campeaoOficial) {
    for (const m of Object.values(map)) {
      if (m.campeao === state.campeaoOficial) { m.pts+=20; m.acertouCampeao=true; }
    }
  }
  state.ranking=Object.values(map).sort((a,b)=>b.pts-a.pts||b.exatos-a.exatos||b.resultados-a.resultados||b.parciais-a.parciais);

  // Buscar posição anterior do histórico (snapshot mais recente)
  // Agrupa por snapshot_at truncado ao segundo para evitar divergência de microssegundos
  const snapGroups = {};
  for (const h of state.historicoRanking) {
    const key = h.snapshot_at ? h.snapshot_at.substring(0,19) : null;
    if (!key) continue;
    if (!snapGroups[key]) snapGroups[key] = [];
    snapGroups[key].push(h);
  }
  const snapKeys = Object.keys(snapGroups).sort().reverse();
  const posAnteriorMap = {};
  if (snapKeys.length > 0) {
    for (const h of snapGroups[snapKeys[0]]) {
      posAnteriorMap[h.participante_id] = h.posicao;
    }
  }
  // Aplicar variação de posição
  state.ranking.forEach((p,i)=>{
    const posAtual = i+1;
    const posAnt = posAnteriorMap[p.id];
    if (posAnt === undefined) { p.variacao = null; }
    else if (posAtual < posAnt) { p.variacao = 'subiu'; p.variacaoN = posAnt - posAtual; }
    else if (posAtual > posAnt) { p.variacao = 'caiu'; p.variacaoN = posAtual - posAnt; }
    else { p.variacao = 'manteve'; p.variacaoN = 0; }
  });
}

async function salvarSnapshotRanking() {
  if (state.ranking.length === 0) { showMsg('Nenhum participante para salvar', true); return; }
  try {
    const ts = new Date().toISOString();
    // Supabase aceita array direto no POST com Prefer: return=minimal
    const registros = state.ranking.map((p,i)=>({
      participante_id: p.id,
      posicao: i+1,
      pontos: p.pts,
      snapshot_at: ts
    }));
    const opts = {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + state.session.access_token,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(registros)
    };
    const r = await fetch(SUPABASE_URL + '/rest/v1/ranking_historico', opts);
    if (!r.ok) { const e=await r.json(); throw new Error(e.message||'Erro'); }
    showMsg('📸 Snapshot do ranking salvo!');
    await loadAll();
  } catch(e) { showMsg('Erro ao salvar snapshot: '+e.message, true); }
}

async function compartilharRanking() {
  const r = state.ranking;
  if (r.length === 0) { showMsg('Nenhum participante no ranking ainda', true); return; }
  let texto = `🏆 *RANKING BOLÃO COPA 2026* 🏆\n\n`;
  r.forEach((p, i) => {
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}º`;
    texto += `${medal} ${p.nome} — ${p.pts} pts (⭐${p.exatos} ✓${p.resultados} 〜${p.parciais})\n`;
  });
  texto += `\n⭐ Exato=5pts | ✓ Resultado=3pts | 〜 Parcial=1pt`;

  if (navigator.share) {
    try {
      await navigator.share({ title: 'Ranking Bolão Copa 2026', text: texto });
      return;
    } catch(e) { /* usuário cancelou ou não suportado, cai no fallback */ }
  }
  // Fallback: copiar para a área de transferência
  try {
    await navigator.clipboard.writeText(texto);
    showMsg('📋 Ranking copiado! Cole no WhatsApp ou onde quiser.');
  } catch(e) {
    showMsg('Não foi possível copiar automaticamente. Selecione o texto manualmente.', true);
  }
}

      ?`<span class="score-num">${j.gols_casa}</span><span class="score-sep">×</span><span class="score-num">${j.gols_fora}</span>`

        <div class="next-match-content">
          <span class="next-match-team">${flagImg(proximoJogo.time_casa,24)} ${proximoJogo.time_casa}</span>
          <span class="next-match-vs">vs</span>
          <span class="next-match-team">${proximoJogo.time_fora} ${flagImg(proximoJogo.time_fora,24)}</span>
        </div>
        <div class="next-match-sub">Jogo ${proximoJogo.numero} · ${FASES[proximoJogo.fase]||proximoJogo.fase}${formatarDataHora(proximoJogo.data_hora)}</div>
        <div class="next-match-countdown" id="next-match-countdown"></div>
      </div>
    </div>` : '';

  setTimeout(iniciarCountdownProximoJogo, 0);

  return `<div class="page"><div class="page-title"><i class="ti ti-ball-football"></i> Tabela de Jogos</div>${proximoBanner}<div class="fase-tabs">${faseTabs}</div>${grupoTabs}${cards}</div>`;

function formatarDataHora(isoString) {
  if (!isoString) return '';
  try {
    const d = new Date(isoString);
    const dataFmt = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', timeZone:'America/Sao_Paulo' });
    const horaFmt = d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', timeZone:'America/Sao_Paulo' });
    return ` · ${dataFmt} às ${horaFmt} (horário de Brasília)`;
  } catch(e) { return ''; }
}

function iniciarCountdownProximoJogo() {
  if (_countdownInterval) { clearInterval(_countdownInterval); _countdownInterval = null; }

  const banner = document.getElementById('next-match-banner');
  const countdownEl = document.getElementById('next-match-countdown');
  const labelEl = document.getElementById('next-match-label');
  if (!banner || !countdownEl) return;

  const horaISO = banner.dataset.jogoHora;
  if (!horaISO) {
    countdownEl.innerHTML = '';
    return;
  }

  const alvo = new Date(horaISO).getTime();

  function tick() {
    const agora = Date.now();
    const diff = alvo - agora;

    if (diff <= 0) {
      labelEl.innerHTML = '<i class="ti ti-clock"></i> Jogo em andamento';
      countdownEl.innerHTML = '<span class="live-badge"><span class="live-dot"></span> EM ANDAMENTO</span>';
      banner.classList.add('live');
      return;
    }

    const dias = Math.floor(diff / 86400000);
    const horas = Math.floor((diff % 86400000) / 3600000);
    const min = Math.floor((diff % 3600000) / 60000);
    const seg = Math.floor((diff % 60000) / 1000);

    let texto = '';
    if (dias > 0) texto = `${dias}d ${horas}h ${min}m`;
    else if (horas > 0) texto = `${horas}h ${min}m ${seg}s`;
    else texto = `${min}m ${seg}s`;

    countdownEl.innerHTML = `<i class="ti ti-hourglass"></i> Começa em ${texto}`;
  }

  tick();
  _countdownInterval = setInterval(tick, 1000);
}

function toggleAccordion(jogoId) {
  const list = document.getElementById('acc-'+jogoId);
  const btn  = document.getElementById('toggle-'+jogoId);
  if (!list || !btn) return;
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'flex';
  list.style.flexDirection = 'column';
  btn.classList.toggle('open', !isOpen);
}

function _markDirty(jogoId) {
  // troca botão para "salvar" se já tinha palpite e o valor mudou
  const btn = document.getElementById('ps-'+jogoId);
  if (!btn) return;
  if (btn.classList.contains('clear')) {
    btn.className='pr-save save';
    btn.innerHTML='<i class="ti ti-check" style="font-size:13px"></i>';
    btn.title='Salvar';
    const partId = state.modalPart;
    btn.onclick=()=>_salvarPalpite(partId, jogoId);
  }
}

async function _salvarPalpite(partId, jogoId) {
  const gc = document.getElementById('pi-c-'+jogoId)?.value;
  const gf = document.getElementById('pi-f-'+jogoId)?.value;
  if (gc===''||gf===''||gc===null||gf===null) { showMsg('Informe o placar',true); return; }
  const gcN=parseInt(gc), gfN=parseInt(gf);
  if (isNaN(gcN)||isNaN(gfN)) { showMsg('Placar inválido',true); return; }

  const btn = document.getElementById('ps-'+jogoId);
  if (btn) { btn.innerHTML='<i class="ti ti-loader spin" style="font-size:12px"></i>'; btn.disabled=true; }

  try {
    const existe = state.palpites.find(p=>p.participante_id===partId&&p.jogo_id===jogoId);
    if (existe) {
      await api(`/rest/v1/palpites?id=eq.${existe.id}`,'PATCH',{gols_casa:gcN,gols_fora:gfN});
    } else {
      await api('/rest/v1/palpites','POST',{participante_id:partId,jogo_id:jogoId,gols_casa:gcN,gols_fora:gfN});
    }
    // atualiza estado local sem recarregar tudo
    const idx = state.palpites.findIndex(p=>p.participante_id===partId&&p.jogo_id===jogoId);
    if (idx>=0) { state.palpites[idx].gols_casa=gcN; state.palpites[idx].gols_fora=gfN; }
    else { state.palpites.push({participante_id:partId,jogo_id:jogoId,gols_casa:gcN,gols_fora:gfN,pontos:null,id:'tmp-'+Date.now()}); }
    computeRanking();
    // feedback visual inline
    if (btn) {
      btn.className='pr-save saved'; btn.disabled=false;
      btn.innerHTML='<i class="ti ti-check" style="font-size:13px"></i>';
      btn.onclick=null;
    }
    // atualiza contador no título
    const total = state.palpites.filter(p=>p.participante_id===partId).length;
    const badgeEl = document.querySelector('#modal-palpites .badge-ok');
    if (badgeEl) badgeEl.textContent=`${total}/${state.jogos.length}`;
  } catch(e) {
    showMsg('Erro: '+e.message,true);
    if (btn) { btn.innerHTML='<i class="ti ti-check" style="font-size:13px"></i>'; btn.disabled=false; }
  }
}

  const btn=document.getElementById('ps-'+jogoId);
  if (btn) { btn.innerHTML='<i class="ti ti-loader spin" style="font-size:12px"></i>'; btn.disabled=true; }
  try {
    await api(`/rest/v1/palpites?id=eq.${palpiteId}`,'DELETE');
    state.palpites=state.palpites.filter(p=>p.id!==palpiteId);
    computeRanking();
    _renderModalPalpites();
  } catch(e) {
    showMsg('Erro: '+e.message,true);
    if (btn) { btn.innerHTML='<i class="ti ti-x" style="font-size:12px"></i>'; btn.disabled=false; }
  }
}

function fecharModal(){
  document.getElementById('modal-palpites')?.remove();
  state.modalFase=null; state.modalGrupo=null;
  render(); // atualiza contadores na tabela
}

async function salvarCampeao() {
  const val = document.getElementById('cfg-campeao')?.value;
  if (!val) { showMsg('Escolha o campeão', true); return; }
  if (!confirm(`Confirmar ${val} como campeão da Copa 2026? Os +20 pts serão aplicados imediatamente.`)) return;
  try {
    await api('/rest/v1/config?chave=eq.campeao_oficial', 'PATCH', {valor: val});
    state.campeaoOficial = val;
    computeRanking();
    showMsg(`🏆 ${val} definido como campeão! +20 pts aplicados.`);
    render();
  } catch(e) { showMsg('Erro: '+e.message, true); }
}

async function limparCampeao() {
  if (!confirm('Remover o campeão oficial? Os +20 pts serão retirados.')) return;
  try {
    await api('/rest/v1/config?chave=eq.campeao_oficial', 'PATCH', {valor: null});
    state.campeaoOficial = null;
    computeRanking();
    showMsg('Campeão removido.');
    render();
  } catch(e) { showMsg('Erro: '+e.message, true); }
}

async function cadastrarPart() {
  const nome=document.getElementById('np-nome')?.value?.trim();
  const campeao=document.getElementById('np-campeao')?.value;
  if (!nome){showMsg('Informe o nome',true);return;}
  try{
    await api('/rest/v1/participantes','POST',{nome,palpite_campeao:campeao||null});
    await loadAll(); showMsg('Participante cadastrado!');
    document.getElementById('np-nome').value='';
    document.getElementById('np-campeao').value='';
  }catch(e){showMsg('Erro: '+e.message,true);}
}

async function salvarResultado(jogoId){
  const gc=parseInt(document.getElementById('gc-'+jogoId)?.value);
  const gf=parseInt(document.getElementById('gf-'+jogoId)?.value);
  if(isNaN(gc)||isNaN(gf)){showMsg('Informe o placar completo',true);return;}
  if(!confirm('Encerrar este jogo? Os palpites serão pontuados.'))return;
  try{
    // Salva snapshot do ranking ANTES de encerrar, para registrar posições atuais
    await _tirarSnapshotSilencioso();
    await api(`/rest/v1/jogos?id=eq.${jogoId}`,'PATCH',{gols_casa:gc,gols_fora:gf,encerrado:true});
    await loadAll(); showMsg('Resultado salvo e pontos computados!');
  }catch(e){showMsg('Erro: '+e.message,true);}
}

async function _tirarSnapshotSilencioso(){
  if(state.ranking.length===0) return;
  try{
    const ts = new Date().toISOString();
    const registros = state.ranking.map((p,i)=>({
      participante_id: p.id,
      posicao: i+1,
      pontos: p.pts,
      snapshot_at: ts
    }));
    const opts = {
      method:'POST',
      headers:{
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer '+state.session.access_token,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(registros)
    };
    await fetch(SUPABASE_URL+'/rest/v1/ranking_historico', opts);
  } catch(e){ console.warn('Snapshot silencioso falhou:', e.message); }
}

async function reabrirJogo(jogoId){
  if(!confirm('Reabrir este jogo? Os pontos serão zerados.'))return;
  try{
    await api(`/rest/v1/jogos?id=eq.${jogoId}`,'PATCH',{gols_casa:null,gols_fora:null,encerrado:false});
    await api(`/rest/v1/palpites?jogo_id=eq.${jogoId}`,'PATCH',{pontos:null});
    await loadAll(); showMsg('Jogo reaberto!');
  }catch(e){showMsg('Erro: '+e.message,true);}
}

sb.auth.getSession().then(({data})=>{
  if(data.session){state.session=data.session;state.adminLogado=true;}
  loadAll();
});
</script>
